<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% include meta.html %}
  <meta name="theme-color" content="#f5f7f8" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0d171b" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    document.documentElement.classList.remove('no-js');
    document.documentElement.classList.add('js');
    try {
      const savedTheme = localStorage.getItem('theme');
      const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = savedTheme || preferredTheme;
    } catch (error) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
</head>
