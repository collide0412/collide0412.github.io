<article class="blog-card">
  <p class="project-meta"><time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %-d, %Y" }}</time></p>
  <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
  <p>{{ post.description | default: post.excerpt | strip_html | strip_newlines | truncatewords: 32 }}</p>
  <a class="text-link" href="{{ post.url | relative_url }}">Read article →</a>
</article>
