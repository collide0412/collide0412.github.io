- title: Cross-dataset network intrusion detection
  category: Network security
  status: Ongoing research
  summary: Examines how an XGBoost-based DDoS detector transfers between CIC-IDS-2017 and CIC-IDS-2018.
  problem: Models trained on one intrusion-detection dataset may not transfer cleanly to traffic collected in another environment.
  approach: Evaluate out-of-distribution behavior, concept drift, false-positive-aware thresholds, and reduced feature sets across the two datasets.
  limitations: This is ongoing work; no publication status or final performance result is claimed here.
  technologies:
    - Python
    - XGBoost
    - CIC-IDS-2017
    - CIC-IDS-2018
  featured: true

- title: Protocol-aware PCAP segmentation
  category: Packet processing
  status: Research tooling
  summary: Segments packet captures while tracking byte-offset boundaries for downstream dataset and flow-feature work.
