---
layout: default
---
<article class="post-shell">
  <div class="site-container">
    <header class="post-header">
      <p class="eyebrow">Writing</p>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        <span aria-hidden="true"> · </span>{{ site.author.name }}
      </p>
      {% if page.description %}<p class="lede">{{ page.description }}</p>{% endif %}
    </header>

    {% if page.image %}
    <figure class="post-figure">
      <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title | escape }}" decoding="async">
      {% if page.image_caption %}<figcaption>{{ page.image_caption }}</figcaption>{% endif %}
    </figure>
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>
    <p class="section-action"><a class="text-link" href="{{ '/blog/' | relative_url }}">← Back to writing</a></p>
  </div>
</article>
